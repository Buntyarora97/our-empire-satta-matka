openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Our Empire - Satta Matka Application API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: user
    description: User operations
  - name: markets
    description: Market operations
  - name: bets
    description: Betting operations
  - name: wallet
    description: Wallet operations
  - name: results
    description: Results
  - name: admin-auth
    description: Admin authentication
  - name: admin-users
    description: Admin user management
  - name: admin-bets
    description: Admin bet management
  - name: admin-results
    description: Admin result management
  - name: admin-transactions
    description: Admin transaction management
  - name: admin-markets
    description: Admin market management
  - name: admin-analytics
    description: Admin analytics
  - name: admin-notifications
    description: Admin notifications
  - name: admin-settings
    description: Admin settings

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # AUTH
  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: Registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /auth/forgot-password:
    post:
      operationId: forgotPassword
      tags: [auth]
      summary: Request password reset
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                phone:
                  type: string
              required: [phone]
      responses:
        "200":
          description: OTP sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /auth/verify-otp:
    post:
      operationId: verifyOtp
      tags: [auth]
      summary: Verify OTP
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                phone:
                  type: string
                otp:
                  type: string
              required: [phone, otp]
      responses:
        "200":
          description: OTP verified
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /auth/reset-password:
    post:
      operationId: resetPassword
      tags: [auth]
      summary: Reset password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                phone:
                  type: string
                otp:
                  type: string
                newPassword:
                  type: string
              required: [phone, otp, newPassword]
      responses:
        "200":
          description: Password reset
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /auth/profile:
    get:
      operationId: getProfile
      tags: [auth]
      summary: Get current user profile
      security:
        - bearerAuth: []
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
    put:
      operationId: updateProfile
      tags: [auth]
      summary: Update profile
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProfileRequest"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"

  # USER
  /user/dashboard:
    get:
      operationId: getUserDashboard
      tags: [user]
      summary: Get user dashboard data
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Dashboard data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserDashboard"

  /user/balance:
    get:
      operationId: getUserBalance
      tags: [user]
      summary: Get user balance
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Balance
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BalanceResponse"

  /user/bets:
    get:
      operationId: getUserBets
      tags: [user]
      summary: Get user bets
      security:
        - bearerAuth: []
      parameters:
        - name: filter
          in: query
          schema:
            type: string
            enum: [today, yesterday, week, all]
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Bets list
          content:
            application/json:
              schema:
                type: object
                properties:
                  bets:
                    type: array
                    items:
                      $ref: "#/components/schemas/Bet"
                required: [bets]

  /user/winnings:
    get:
      operationId: getUserWinnings
      tags: [user]
      summary: Get user winnings
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Winnings
          content:
            application/json:
              schema:
                type: object
                properties:
                  winnings:
                    type: array
                    items:
                      $ref: "#/components/schemas/Bet"
                  totalWon:
                    type: number
                required: [winnings, totalWon]

  /user/transactions:
    get:
      operationId: getUserTransactions
      tags: [user]
      summary: Get user transactions
      security:
        - bearerAuth: []
      parameters:
        - name: type
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Transactions
          content:
            application/json:
              schema:
                type: object
                properties:
                  transactions:
                    type: array
                    items:
                      $ref: "#/components/schemas/Transaction"
                required: [transactions]

  /user/referrals:
    get:
      operationId: getUserReferrals
      tags: [user]
      summary: Get referral info
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Referral info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReferralInfo"

  /user/analytics:
    get:
      operationId: getUserAnalytics
      tags: [user]
      summary: Get user analytics
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Analytics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserAnalytics"

  /user/change-password:
    post:
      operationId: changePassword
      tags: [user]
      summary: Change password
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                oldPassword:
                  type: string
                newPassword:
                  type: string
              required: [oldPassword, newPassword]
      responses:
        "200":
          description: Changed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /user/notifications:
    get:
      operationId: getUserNotifications
      tags: [user]
      summary: Get user notifications
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Notifications
          content:
            application/json:
              schema:
                type: object
                properties:
                  notifications:
                    type: array
                    items:
                      $ref: "#/components/schemas/Notification"
                  unreadCount:
                    type: integer
                required: [notifications, unreadCount]

  # MARKETS
  /markets:
    get:
      operationId: getMarkets
      tags: [markets]
      summary: Get all active markets
      responses:
        "200":
          description: Markets list
          content:
            application/json:
              schema:
                type: object
                properties:
                  markets:
                    type: array
                    items:
                      $ref: "#/components/schemas/Market"
                required: [markets]

  /markets/{id}:
    get:
      operationId: getMarket
      tags: [markets]
      summary: Get market by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Market
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Market"

  /markets/{id}/results:
    get:
      operationId: getMarketResults
      tags: [markets]
      summary: Get market results
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Results
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      $ref: "#/components/schemas/Result"
                required: [results]

  /markets/{id}/live-status:
    get:
      operationId: getMarketLiveStatus
      tags: [markets]
      summary: Get market live status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Live status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarketLiveStatus"

  # BETS
  /bets/place:
    post:
      operationId: placeBet
      tags: [bets]
      summary: Place a bet
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlaceBetRequest"
      responses:
        "201":
          description: Bet placed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Bet"

  /bets/my-bets:
    get:
      operationId: getMyBets
      tags: [bets]
      summary: Get my bets
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Bets
          content:
            application/json:
              schema:
                type: object
                properties:
                  bets:
                    type: array
                    items:
                      $ref: "#/components/schemas/Bet"
                required: [bets]

  /bets/{id}:
    get:
      operationId: getBet
      tags: [bets]
      summary: Get bet by ID
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Bet
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Bet"
    delete:
      operationId: cancelBet
      tags: [bets]
      summary: Cancel a bet
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Cancelled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  # WALLET
  /wallet/add-money-request:
    post:
      operationId: addMoneyRequest
      tags: [wallet]
      summary: Submit add money request
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddMoneyRequest"
      responses:
        "201":
          description: Request submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transaction"

  /wallet/withdrawal-request:
    post:
      operationId: withdrawalRequest
      tags: [wallet]
      summary: Submit withdrawal request
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WithdrawalRequest"
      responses:
        "201":
          description: Request submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transaction"

  /wallet/history:
    get:
      operationId: getWalletHistory
      tags: [wallet]
      summary: Get wallet history
      security:
        - bearerAuth: []
      responses:
        "200":
          description: History
          content:
            application/json:
              schema:
                type: object
                properties:
                  transactions:
                    type: array
                    items:
                      $ref: "#/components/schemas/Transaction"
                required: [transactions]

  /wallet/upi-details:
    get:
      operationId: getUpiDetails
      tags: [wallet]
      summary: Get assigned UPI details for user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: UPI details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpiDetails"

  # RESULTS
  /results/recent:
    get:
      operationId: getRecentResults
      tags: [results]
      summary: Get recent results
      responses:
        "200":
          description: Recent results
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      $ref: "#/components/schemas/Result"
                required: [results]

  /results/market/{id}:
    get:
      operationId: getResultsByMarket
      tags: [results]
      summary: Get results by market
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Results
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      $ref: "#/components/schemas/Result"
                required: [results]

  /results/charts/{marketId}:
    get:
      operationId: getResultCharts
      tags: [results]
      summary: Get result charts for a market
      parameters:
        - name: marketId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Chart data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChartData"

  # ADMIN AUTH
  /admin/auth/login:
    post:
      operationId: adminLogin
      tags: [admin-auth]
      summary: Admin login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminLoginRequest"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminAuthResponse"

  /admin/auth/profile:
    get:
      operationId: getAdminProfile
      tags: [admin-auth]
      summary: Get admin profile
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Admin profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUser"

  # ADMIN USERS
  /admin/users:
    get:
      operationId: adminGetUsers
      tags: [admin-users]
      summary: Get all users
      security:
        - bearerAuth: []
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Users list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedUsers"

  /admin/users/{id}:
    get:
      operationId: adminGetUser
      tags: [admin-users]
      summary: Get user by ID
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: User
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserDetail"

  /admin/users/{id}/status:
    put:
      operationId: adminUpdateUserStatus
      tags: [admin-users]
      summary: Update user status
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  enum: [active, blocked, suspended]
              required: [status]
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /admin/users/{id}/balance:
    put:
      operationId: adminUpdateUserBalance
      tags: [admin-users]
      summary: Adjust user balance
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                amount:
                  type: number
                reason:
                  type: string
              required: [amount, reason]
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /admin/users/{id}/activity:
    get:
      operationId: adminGetUserActivity
      tags: [admin-users]
      summary: Get user activity log
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Activity
          content:
            application/json:
              schema:
                type: object
                properties:
                  activities:
                    type: array
                    items:
                      $ref: "#/components/schemas/ActivityLog"
                required: [activities]

  /admin/users/{id}/bets:
    get:
      operationId: adminGetUserBets
      tags: [admin-users]
      summary: Get bets for a user
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Bets
          content:
            application/json:
              schema:
                type: object
                properties:
                  bets:
                    type: array
                    items:
                      $ref: "#/components/schemas/Bet"
                required: [bets]

  # ADMIN BETS
  /admin/bets:
    get:
      operationId: adminGetBets
      tags: [admin-bets]
      summary: Get all bets
      security:
        - bearerAuth: []
      parameters:
        - name: market
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
        - name: date
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Bets
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedBets"

  /admin/bets/{id}/cancel:
    put:
      operationId: adminCancelBet
      tags: [admin-bets]
      summary: Cancel a bet
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Cancelled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /admin/bets/analytics/numbers:
    get:
      operationId: adminGetNumberAnalytics
      tags: [admin-bets]
      summary: Get number betting analytics
      security:
        - bearerAuth: []
      parameters:
        - name: marketId
          in: query
          schema:
            type: string
        - name: date
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Analytics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NumberAnalytics"

  /admin/bets/analytics/markets:
    get:
      operationId: adminGetMarketBetAnalytics
      tags: [admin-bets]
      summary: Get market-wise betting analytics
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Analytics
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/MarketBetSummary"
                required: [data]

  # ADMIN RESULTS
  /admin/results:
    post:
      operationId: adminAddResult
      tags: [admin-results]
      summary: Add result for a market
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddResultRequest"
      responses:
        "201":
          description: Result added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Result"
    get:
      operationId: adminGetResults
      tags: [admin-results]
      summary: Get all results
      security:
        - bearerAuth: []
      parameters:
        - name: marketId
          in: query
          schema:
            type: string
        - name: date
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Results
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      $ref: "#/components/schemas/Result"
                required: [results]

  /admin/results/{id}:
    put:
      operationId: adminUpdateResult
      tags: [admin-results]
      summary: Update result
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddResultRequest"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Result"
    delete:
      operationId: adminDeleteResult
      tags: [admin-results]
      summary: Delete result
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  # ADMIN TRANSACTIONS
  /admin/transactions/deposits:
    get:
      operationId: adminGetDeposits
      tags: [admin-transactions]
      summary: Get all deposit requests
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Deposits
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedTransactions"

  /admin/transactions/withdrawals:
    get:
      operationId: adminGetWithdrawals
      tags: [admin-transactions]
      summary: Get all withdrawal requests
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Withdrawals
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedTransactions"

  /admin/transactions/deposits/{id}/approve:
    put:
      operationId: adminApproveDeposit
      tags: [admin-transactions]
      summary: Approve deposit
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Approved
          content:
