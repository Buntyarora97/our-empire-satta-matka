components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    MessageResponse:
      type: object
      properties:
        message:
          type: string
        success:
          type: boolean
      required: [message, success]

    AuthResponse:
      type: object
      properties:
        token:
          type: string
        refreshToken:
          type: string
        user:
          $ref: "#/components/schemas/UserProfile"
      required: [token, user]

    AdminAuthResponse:
      type: object
      properties:
        token:
          type: string
        admin:
          $ref: "#/components/schemas/AdminUser"
      required: [token, admin]

    RegisterRequest:
      type: object
      properties:
        fullName:
          type: string
        phone:
          type: string
        email:
          type: string
        password:
          type: string
        referralCode:
          type: string
      required: [fullName, phone, password]

    LoginRequest:
      type: object
      properties:
        phone:
          type: string
        password:
          type: string
      required: [phone, password]

    AdminLoginRequest:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
      required: [username, password]

    UpdateProfileRequest:
      type: object
      properties:
        fullName:
          type: string
        email:
          type: string
        bankAccountNumber:
          type: string
        ifscCode:
          type: string
        accountHolderName:
          type: string
        upiId:
          type: string

    UserProfile:
      type: object
      properties:
        id:
          type: string
        fullName:
          type: string
        phone:
          type: string
        email:
          type: string
        balance:
          type: number
        referralCode:
          type: string
        status:
          type: string
        kycStatus:
          type: string
        createdAt:
          type: string
        bankAccountNumber:
          type: string
        ifscCode:
          type: string
        accountHolderName:
          type: string
        upiId:
          type: string
      required: [id, fullName, phone, balance, referralCode, status, createdAt]

    AdminUser:
      type: object
      properties:
        id:
          type: string
        username:
          type: string
        role:
          type: string
        lastLogin:
          type: string
      required: [id, username, role]

    UserDetail:
      type: object
      properties:
        id:
          type: string
        fullName:
          type: string
        phone:
          type: string
        email:
          type: string
        balance:
          type: number
        referralCode:
          type: string
        status:
          type: string
        kycStatus:
          type: string
        createdAt:
          type: string
        lastLogin:
          type: string
        totalBets:
          type: integer
        totalDeposits:
          type: number
        totalWithdrawals:
          type: number
      required: [id, fullName, phone, balance, status, createdAt]

    BalanceResponse:
      type: object
      properties:
        balance:
          type: number
      required: [balance]

    UserDashboard:
      type: object
      properties:
        balance:
          type: number
        totalBets:
          type: integer
        totalWon:
          type: number
        totalLost:
          type: number
        recentBets:
          type: array
          items:
            $ref: "#/components/schemas/Bet"
        activeMarkets:
          type: array
          items:
            $ref: "#/components/schemas/Market"
        recentResults:
          type: array
          items:
            $ref: "#/components/schemas/Result"
        notifications:
          type: array
          items:
            $ref: "#/components/schemas/Notification"
        unreadNotifications:
          type: integer
      required: [balance, totalBets, totalWon, totalLost, recentBets, activeMarkets, recentResults]

    UserAnalytics:
      type: object
      properties:
        totalBets:
          type: integer
        totalWagered:
          type: number
        totalWon:
          type: number
        winRate:
          type: number
        profitLoss:
          type: number
        favoriteMarket:
          type: string
        monthlyData:
          type: array
          items:
            type: object
            properties:
              date:
                type: string
              wagered:
                type: number
              won:
                type: number
            required: [date, wagered, won]
      required: [totalBets, totalWagered, totalWon, winRate, profitLoss]

    ReferralInfo:
      type: object
      properties:
        referralCode:
          type: string
        totalReferrals:
          type: integer
        totalEarnings:
          type: number
        referrals:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              date:
                type: string
              earning:
                type: number
            required: [name, date, earning]
      required: [referralCode, totalReferrals, totalEarnings, referrals]

    Market:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        openTime:
          type: string
        closeTime:
          type: string
        status:
          type: string
        minBet:
          type: number
        maxBet:
          type: number
        payoutRatio:
          type: number
        isBettingOpen:
          type: boolean
        latestResult:
          $ref: "#/components/schemas/Result"
      required: [id, name, openTime, closeTime, status, minBet, maxBet, isBettingOpen]

    MarketLiveStatus:
      type: object
      properties:
        marketId:
          type: string
        isOpen:
          type: boolean
        timeLeft:
          type: integer
        status:
          type: string
      required: [marketId, isOpen, status]

    CreateMarketRequest:
      type: object
      properties:
        name:
          type: string
        openTime:
          type: string
        closeTime:
          type: string
        minBet:
          type: number
        maxBet:
          type: number
        payoutRatio:
          type: number
        status:
          type: string
      required: [name, openTime, closeTime, minBet, maxBet]

    Bet:
      type: object
      properties:
        id:
          type: string
        userId:
          type: string
        marketId:
          type: string
        marketName:
          type: string
        gameType:
          type: string
          enum: [jantri, open, crossing, no_to_no]
        numbers:
          type: array
          items:
            type: object
            properties:
              number:
                type: string
              amount:
                type: number
            required: [number, amount]
        totalAmount:
          type: number
        status:
          type: string
          enum: [pending, won, lost, cancelled]
        winAmount:
          type: number
        createdAt:
          type: string
        settledAt:
          type: string
      required: [id, marketId, gameType, numbers, totalAmount, status, createdAt]

    PlaceBetRequest:
      type: object
      properties:
        marketId:
          type: string
        gameType:
          type: string
          enum: [jantri, open, crossing, no_to_no]
        numbers:
          type: array
          items:
            type: object
            properties:
              number:
                type: string
              amount:
                type: number
            required: [number, amount]
      required: [marketId, gameType, numbers]

    Result:
      type: object
      properties:
        id:
          type: string
        marketId:
          type: string
        marketName:
          type: string
        date:
          type: string
        openNumber:
          type: string
        closeNumber:
          type: string
        jodiNumber:
          type: string
        status:
          type: string
          enum: [scheduled, live, completed]
        createdAt:
          type: string
      required: [id, marketId, date, status]

    AddResultRequest:
      type: object
      properties:
        marketId:
          type: string
        date:
          type: string
        openNumber:
          type: string
        closeNumber:
          type: string
        jodiNumber:
          type: string
      required: [marketId, date]

    Transaction:
      type: object
      properties:
        id:
          type: string
        userId:
          type: string
        userName:
          type: string
        type:
          type: string
          enum: [deposit, withdrawal, bet, win, referral, commission, adjustment]
        amount:
          type: number
        status:
          type: string
          enum: [pending, completed, rejected, cancelled]
        method:
          type: string
        utrNumber:
          type: string
        screenshotUrl:
          type: string
        adminNote:
          type: string
        bankDetails:
          type: object
          properties:
            accountNumber:
              type: string
            ifscCode:
              type: string
            accountHolderName:
              type: string
            upiId:
              type: string
        createdAt:
          type: string
        processedAt:
          type: string
      required: [id, type, amount, status, createdAt]

    AddMoneyRequest:
      type: object
      properties:
        amount:
          type: number
        utrNumber:
          type: string
        screenshotUrl:
          type: string
      required: [amount, utrNumber]

    WithdrawalRequest:
      type: object
      properties:
        amount:
          type: number
        method:
          type: string
          enum: [bank, upi]
        bankAccountNumber:
          type: string
        ifscCode:
          type: string
        accountHolderName:
          type: string
        upiId:
          type: string
      required: [amount, method]

    UpiDetails:
      type: object
      properties:
        upiId:
          type: string
        qrCodeUrl:
          type: string
      required: [upiId]

    UpiAccount:
      type: object
      properties:
        id:
          type: string
        upiId:
          type: string
        qrCodeUrl:
          type: string
        isActive:
          type: boolean
        createdAt:
          type: string
      required: [id, upiId, isActive]

    UpiAccountRequest:
      type: object
      properties:
        upiId:
          type: string
        qrCodeUrl:
          type: string
        isActive:
          type: boolean
      required: [upiId]

    ChartData:
      type: object
      properties:
        marketId:
          type: string
        data:
          type: array
          items:
            type: object
            properties:
              date:
                type: string
              openNumber:
                type: string
              closeNumber:
                type: string
              jodiNumber:
                type: string
            required: [date]
      required: [marketId, data]

    Notification:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        message:
          type: string
        type:
          type: string
        isRead:
          type: boolean
        createdAt:
          type: string
      required: [id, title, message, type, isRead, createdAt]

    SendNotificationRequest:
      type: object
      properties:
        title:
          type: string
        message:
          type: string
        type:
          type: string
          enum: [all, specific, market]
        targetUsers:
          type: array
          items:
            type: string
        targetMarket:
          type: string
      required: [title, message, type]

    AppSettings:
      type: object
      properties:
        appName:
          type: string
        whatsappNumber:
          type: string
        telegramLink:
          type: string
        minDeposit:
          type: number
        minWithdrawal:
          type: number
        referralCommission:
          type: number
        maintenanceMode:
          type: boolean
        bettingLockMinutes:
          type: integer
      required: [appName]

    AdminDashboard:
      type: object
      properties:
        totalUsers:
          type: integer
        newUsersToday:
          type: integer
        totalBetsToday:
          type: integer
        totalWageredToday:
          type: number
        pendingDeposits:
          type: integer
        pendingWithdrawals:
          type: integer
        totalDepositsToday:
          type: number
        totalWithdrawalsToday:
          type: number
        activeMarkets:
          type: integer
        recentActivity:
          type: array
          items:
            $ref: "#/components/schemas/ActivityLog"
        userGrowth:
          type: array
          items:
            type: object
            properties:
              date:
                type: string
              count:
                type: integer
            required: [date, count]
        revenueData:
          type: array
          items:
            type: object
            properties:
              date:
                type: string
              revenue:
                type: number
            required: [date, revenue]
      required: [totalUsers, newUsersToday, totalBetsToday, totalWageredToday, pendingDeposits, pendingWithdrawals, activeMarkets]

    RevenueAnalytics:
      type: object
      properties:
        period:
          type: string
        data:
          type: array
          items:
            type: object
            properties:
              date:
                type: string
              deposits:
                type: number
              withdrawals:
                type: number
              bets:
                type: number
              profit:
                type: number
            required: [date, deposits, withdrawals, bets, profit]
        totals:
          type: object
          properties:
            totalDeposits:
              type: number
            totalWithdrawals:
              type: number
            netRevenue:
              type: number
          required: [totalDeposits, totalWithdrawals, netRevenue]
      required: [period, data, totals]

    UserGrowthAnalytics:
      type: object
      properties:
        totalUsers:
          type: integer
        activeUsers:
          type: integer
        data:
          type: array
          items:
            type: object
            properties:
              date:
                type: string
              newUsers:
                type: integer
              activeUsers:
                type: integer
            required: [date, newUsers, activeUsers]
      required: [totalUsers, activeUsers, data]

    NumberAnalytics:
      type: object
      properties:
        topNumbers:
          type: array
          items:
            type: object
            properties:
              number:
                type: string
              totalBets:
                type: integer
              totalAmount:
                type: number
            required: [number, totalBets, totalAmount]
        leastNumbers:
          type: array
          items:
            type: object
            properties:
              number:
                type: string
              totalBets:
                type: integer
              totalAmount:
                type: number
            required: [number, totalBets, totalAmount]
        heatmap:
          type: array
          items:
            type: object
            properties:
              number:
                type: string
              amount:
                type: number
            required: [number, amount]
      required: [topNumbers, leastNumbers, heatmap]

    MarketBetSummary:
      type: object
      properties:
        marketId:
          type: string
        marketName:
          type: string
        totalBets:
          type: integer
        totalAmount:
          type: number
      required: [marketId, marketName, totalBets, totalAmount]

    PaginatedUsers:
      type: object
      properties:
        users:
          type: array
          items:
            $ref: "#/components/schemas/UserDetail"
        total:
